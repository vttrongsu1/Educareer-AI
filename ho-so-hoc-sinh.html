<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quản lý hồ sơ học tập, điểm thi học bạ và kết quả trắc nghiệm tính cách trực tuyến của bạn tại EduCareer AI.">
    <title>Hồ Sơ Học Sinh - EduCareer AI</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .auth-container {
            max-width: 450px;
            margin: 120px auto 60px auto;
            padding: 40px;
            background: #ffffff;
            border: 1px solid rgba(37, 99, 235, 0.08);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .auth-header i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(6, 182, 212, 0.1));
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .auth-header h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 28px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .auth-toggle-text {
            margin-top: 20px;
            font-size: 0.86rem;
            color: var(--text-muted);
        }

        .auth-toggle-text a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-toggle-text a:hover {
            text-decoration: underline;
        }

        /* Profile Dashboard Styles */
        .profile-layout {
            max-width: 1000px;
            margin: 120px auto 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        .profile-left-sidebar {
            background: #ffffff;
            border: 1px solid rgba(37, 99, 235, 0.08);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            height: fit-content;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-cyan));
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.2);
        }

        .profile-left-sidebar h3 {
            font-size: 1.25rem;
            font-weight: 800;
            margin: 0 0 6px 0;
            color: var(--text-dark);
        }

        .profile-email {
            font-size: 0.86rem;
            color: var(--text-muted);
            margin: 0 0 24px 0;
        }

        .logout-btn {
            width: 100%;
            background: #FEE2E2;
            color: #EF4444;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: #EF4444;
            color: #ffffff;
            box-shadow: 0 6px 15px rgba(239, 68, 68, 0.15);
        }

        .profile-main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .dashboard-card {
            background: #ffffff;
            border: 1px solid rgba(37, 99, 235, 0.08);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .dashboard-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px dashed rgba(37, 99, 235, 0.08);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .dashboard-card-header h4 {
            font-size: 1.1rem;
            font-weight: 800;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dark);
        }

        .dashboard-card-header h4 i {
            color: var(--primary-blue);
        }

        .card-action-link {
            font-size: 0.8rem;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-action-link:hover {
            text-decoration: underline;
        }

        /* Grades progress bars */
        .grades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .grade-progress-item {
            background: #F8FAFC;
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 14px;
            padding: 16px;
        }

        .grade-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .grade-subject-name {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .grade-value {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--primary-blue);
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-cyan));
            border-radius: 3px;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Personality layout */
        .personality-results-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }
            .personality-results-row {
                grid-template-columns: 1fr;
            }
        }

        .personality-result-box {
            background: #F8FAFC;
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .personality-code {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .personality-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .personality-summary {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .profile-empty-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.88rem;
            padding: 20px 0;
            line-height: 1.5;
        }

        .save-status-msg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.84rem;
            margin-bottom: 16px;
            display: none;
        }

        .save-status-msg.error {
            background: #FEE2E2;
            color: #EF4444;
            border: 1px solid rgba(239, 68, 68, 0.1);
            display: block;
        }

        .save-status-msg.success {
            background: #ECFDF5;
            color: #10B981;
            border: 1px solid rgba(16, 185, 129, 0.1);
            display: block;
        }
    </style>
</head>

    <main>
        <!-- AUTH SECTION (Show if not logged in) -->
        <section id="auth-section" class="container" style="display: none; padding-top: 100px; padding-bottom: 50px;">
            <div class="auth-container">
                <div class="auth-header">
                    <i class="fa-solid fa-user-shield"></i>
                    <h2 id="auth-title">Đăng Nhập Học Sinh</h2>
                    <p id="auth-subtitle">Nhập tài khoản để đồng bộ học bạ và lưu kết quả trắc nghiệm.</p>
                </div>

                <div id="auth-error-msg" class="save-status-msg error" style="display: none;"></div>
                <div id="auth-success-msg" class="save-status-msg success" style="display: none;"></div>

                <form id="auth-form">

                    </div>
                    <div class="form-group">
                        <label for="auth-password">Mật khẩu</label>

                    </div>

                    <button type="submit" id="btn-auth-submit" class="btn btn-primary" style="width: 100%; border: none; padding: 14px; font-size: 0.95rem; margin-top: 10px; cursor: pointer;">

                <!-- Main dashboard content -->
                <div class="profile-main-content">
                    
                    <!-- Personal Info Card -->
                    <div class="dashboard-card">
                        <div class="dashboard-card-header" style="border-bottom: 1.5px dashed rgba(37, 99, 235, 0.08); padding-bottom: 16px; margin-bottom: 24px;">
                            <h4 style="font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text-dark); margin: 0;">

                        <div id="info-success-msg" class="save-status-msg success" style="display: none; margin-bottom: 20px;"></div>

                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="info-school">Trường học</label>
                                <input type="text" id="info-school" class="form-control" placeholder="Ví dụ: THPT Nguyễn Huệ" required>
                            </div>

                            <button type="submit" id="btn-save-info" class="btn btn-primary" style="width: 100%; border: none; padding: 14px; font-size: 0.95rem; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">

    <!-- Supabase SDKs & Core scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="industries-data.js"></script>
    <script src="app.js?v=3.0"></script>

    <!-- Auth & Profile Page controller script -->
    <script>
    (() => {
        const authSection = document.getElementById("auth-section");
        const profileSection = document.getElementById("profile-section");
        const authForm = document.getElementById("auth-form");
        const authTitle = document.getElementById("auth-title");
        const authSubtitle = document.getElementById("auth-subtitle");
        const groupName = document.getElementById("group-name");
        const btnAuthSubmit = document.getElementById("btn-auth-submit");
        const authToggleBtn = document.getElementById("auth-toggle-btn");
        const toggleLabelText = document.getElementById("toggle-label-text");
        const authErrorMsg = document.getElementById("auth-error-msg");
        const authSuccessMsg = document.getElementById("auth-success-msg");

        const sidebarStudentName = document.getElementById("sidebar-student-name");
        const sidebarStudentEmail = document.getElementById("sidebar-student-email");
        const sidebarAvatarLetter = document.getElementById("sidebar-avatar-letter");
        const btnLogout = document.getElementById("btn-logout");

        const gradesDisplayList = document.getElementById("grades-display-list");
        const gradesEmptyState = document.getElementById("grades-empty-state");
        const personalityDisplayList = document.getElementById("personality-display-list");
        const personalityEmptyState = document.getElementById("personality-empty-state");

        let isLoginMode = true;

        // Initialize Supabase client
        const sb = typeof getSupabaseClient === 'function' ? getSupabaseClient() : null;

        // 1. Toggle Login / Register form
        authToggleBtn.addEventListener("click", (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            authErrorMsg.style.display = "none";
            authSuccessMsg.style.display = "none";

            if (isLoginMode) {
                authTitle.textContent = "Đăng Nhập Học Sinh";
                authSubtitle.textContent = "Nhập tài khoản để đồng bộ học bạ và lưu kết quả trắc nghiệm.";
                groupName.style.display = "none";
                btnAuthSubmit.textContent = "Đăng Nhập";
                toggleLabelText.textContent = "Chưa có tài khoản?";
                authToggleBtn.textContent = "Đăng ký ngay";
            } else {
                authTitle.textContent = "Đăng Ký Tài Khoản";
                authSubtitle.textContent = "Tạo tài khoản để lưu trữ hồ sơ học tập trực tuyến bảo mật.";
                groupName.style.display = "block";
                btnAuthSubmit.textContent = "Đăng Ký";
                toggleLabelText.textContent = "Đã có tài khoản?";
                authToggleBtn.textContent = "Đăng nhập ngay";
            }
        });

        // 2. Auth Submit logic
        authForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            authErrorMsg.style.display = "none";
            authSuccessMsg.style.display = "none";

            if (!sb) {
                authErrorMsg.textContent = "Supabase chưa được cấu hình! Vui lòng điền credentials vào supabase-config.js.";
                authErrorMsg.style.display = "block";
                return;
            }

            const email = document.getElementById("auth-email").value.trim();
            const password = document.getElementById("auth-password").value;
            const name = document.getElementById("auth-name").value.trim();

            btnAuthSubmit.disabled = true;
            btnAuthSubmit.textContent = isLoginMode ? "Đang đăng nhập..." : "Đang tạo tài khoản...";

            try {
                if (isLoginMode) {
                    // Sign In
                    const { data, error } = await sb.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    authSuccessMsg.textContent = "Đăng nhập thành công! Đang tải hồ sơ...";
                    authSuccessMsg.style.display = "block";
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    // Sign Up
                    if (!name) throw new Error("Vui lòng điền Họ và tên học sinh!");
                     const { data, error } = await sb.auth.signUp({ 
                        email, 
                        password,
                        options: {
                            data: {
                                full_name: name
                            }
                        }
                     });
                     if (error) throw error;

                    const user = data.user;
                    if (user) {
                        // Create profile record in 'students' table with studentName
                        const emptyData = {
                            studentName: name,
                            mbti: "",
                            riasec: {},
                            academic: {}
                        };
                        const { error: dbErr } = await sb.from("students").insert({
                            id: user.id,
                            name: name,
                            data: emptyData
                        });
                        if (dbErr) console.error("Lỗi khi ghi thông tin học sinh ban đầu:", dbErr);
                    }

                    authSuccessMsg.textContent = "Đăng ký thành công! Đang tự động đăng nhập...";
                    authSuccessMsg.style.display = "block";
                    setTimeout(() => window.location.reload(), 1000);
                }
            } catch (err) {
                console.error(err);
                authErrorMsg.textContent = err.message || "Gặp lỗi trong quá trình xử lý xác thực.";
                authErrorMsg.style.display = "block";
            } finally {
                btnAuthSubmit.disabled = false;
                btnAuthSubmit.textContent = isLoginMode ? "Đăng Nhập" : "Đăng Ký";
            }
        });

        // 3. Logout action
        if (btnLogout) {
            btnLogout.addEventListener("click", async () => {
                if (sb) {
                    await sb.auth.signOut();
                    // Clear local cached studentData and grades
                    localStorage.removeItem("educareer_student_profile");
                    localStorage.removeItem("educareer_v2_thpt_lop10");
                    localStorage.removeItem("educareer_v2_thpt_lop11");
                    localStorage.removeItem("educareer_v2_thpt_lop12");
                    localStorage.removeItem("educareer_v2_thcs_lop6");
                    localStorage.removeItem("educareer_v2_thcs_lop7");
                    localStorage.removeItem("educareer_v2_thcs_lop8");
                    localStorage.removeItem("educareer_v2_thcs_lop9");
                    localStorage.removeItem("custom_industries");
                    window.location.reload();
                }
            });
        }

        // 4. Load Profile Dashboard
        async function loadProfileDashboard() {
            if (!sb) {
                authSection.style.display = "block";
                return;
            }

            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                // Not logged in -> Show auth form directly
                authSection.style.display = "block";
                profileSection.style.display = "none";
                return;
            }

            // Logged in -> Show dashboard
            authSection.style.display = "none";
            profileSection.style.display = "block";

            const user = session.user;
            sidebarStudentEmail.textContent = user.email;

            // Fetch profile data from 'students' table
            let nameVal = "Học sinh";
            let dbData = null;

            try {
                const { data, error } = await sb.from("students").select("*").eq("id", user.id).maybeSingle();
                if (data) {
                    nameVal = data.name || "Học sinh";
                    dbData = data.data;
                }
            } catch (ex) {
                console.error("Lỗi tải thông tin học sinh:", ex);
            }

            sidebarStudentName.textContent = nameVal;
            sidebarAvatarLetter.textContent = nameVal.charAt(0).toUpperCase();

            // Populate form inputs
            if (dbData) {
                document.getElementById("info-name").value = dbData.studentName || nameVal;
                document.getElementById("info-dob").value = dbData.dob || "";
                document.getElementById("info-grade").value = dbData.gradeClass || "";
                document.getElementById("info-school").value = dbData.school || "";
            }

            // Register form submit handler for updating info
            const profileInfoForm = document.getElementById("profile-info-form");
            const btnSaveInfo = document.getElementById("btn-save-info");
            const infoSuccessMsg = document.getElementById("info-success-msg");
            const infoErrorMsg = document.getElementById("info-error-msg");

            if (profileInfoForm) {
                profileInfoForm.addEventListener("submit", async (e) => {
                    e.preventDefault();
                    infoSuccessMsg.style.display = "none";
                    infoErrorMsg.style.display = "none";
                    btnSaveInfo.disabled = true;
                    btnSaveInfo.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...`;

                    try {
                        const name = document.getElementById("info-name").value.trim();
                        const dob = document.getElementById("info-dob").value;
                        const grade = document.getElementById("info-grade").value.trim();
                        const school = document.getElementById("info-school").value.trim();

                        if (!dbData) {
                            dbData = {
                                studentId: "HS" + Math.floor(1000 + Math.random() * 9000),
                                studentName: name,
                                school: school,
                                gradeClass: grade,
                                level: "thpt",
                                academic: {},
                                riasec: {},
                                mbti: "",
                                tipi: {}
                            };
                        }

                        dbData.studentName = name;
                        dbData.dob = dob;
                        dbData.gradeClass = grade;
                        dbData.school = school;

                        // Save locally
                        localStorage.setItem('educareer_student_profile', JSON.stringify(dbData));

                        // Sync to Supabase
                        if (typeof window.syncStudentDataToCloud === 'function') {
                            await window.syncStudentDataToCloud(dbData);
                        }

                        // Update sidebar UI values
                        sidebarStudentName.textContent = name;
                        sidebarAvatarLetter.textContent = name.charAt(0).toUpperCase();

                        // Update navbar link name
                        const profileLink = document.getElementById('nav-profile-link');
                        if (profileLink) {
                            profileLink.innerHTML = `<i class="fa-solid fa-user-check"></i> ${name}`;
                        }

                        infoSuccessMsg.textContent = "Cập nhật thông tin hồ sơ học sinh thành công!";
                        infoSuccessMsg.style.display = "block";
                        
                        // Scroll to success message
                        infoSuccessMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    } catch (err) {
                        console.error(err);
                        infoErrorMsg.textContent = "Lỗi khi cập nhật hồ sơ: " + err.message;
                        infoErrorMsg.style.display = "block";
                    } finally {
                        btnSaveInfo.disabled = false;
                        btnSaveInfo.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Lưu Thông Tin`;
                    }
                });
            }
        }

        // Run immediately
        document.addEventListener("DOMContentLoaded", () => {
            loadProfileDashboard();
        });

    })();
    </script>
</body>
</html>
